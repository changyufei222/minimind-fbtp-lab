name: Repository quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check repository metadata
        shell: bash
        run: |
          test -s README.md
          test -s README_CN.md
          test -s CITATION.cff
          test -s CONTRIBUTING.md
          test -s SECURITY.md
          grep -q '^cff-version:' CITATION.cff
          grep -q '^repository-code:' CITATION.cff
      - name: Compile tracked Python sources
        shell: bash
        run: |
          git ls-files '*.py' -z | xargs -0 -r python -m py_compile
